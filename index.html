<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Telegram Snake</title>

    <!-- Official Telegram Web Apps SDK Script -->

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>

        body {

            font-family: Arial, sans-serif;

            background-color: #182533;

            color: white;

            text-align: center;

            margin: 0;

            padding: 0;

            overflow: hidden;

            display: flex;

            flex-direction: column;

            align-items: center;

            justify-content: center;

            height: 100vh;

        }

        h1 { margin-bottom: 5px; font-size: 24px; }

        #score { font-size: 18px; margin-bottom: 15px; }

        canvas {

            background-color: #0f172a;

            border: 4px solid #2b5278;

            box-shadow: 0px 4px 20px rgba(0,0,0,0.5);

        }

        #game-over-screen {

            display: none;

            position: absolute;

            background: rgba(24, 37, 51, 0.95);

            border: 2px solid #2b5278;

            padding: 30px;

            border-radius: 15px;

            box-shadow: 0 10px 25px rgba(0,0,0,0.5);

        }

        #emoji { font-size: 80px; margin: 10px 0; }

        button {

            background-color: #2481cc;

            color: white;

            border: none;

            padding: 12px 25px;

            font-size: 16px;

            border-radius: 8px;

            cursor: pointer;

            font-weight: bold;

        }

    </style>

</head>

<body>

 

    <h1>Telegram Snake 🐍</h1>

    <div id="score">Score: 0</div>

    <canvas id="gameCanvas" width="300" height="300"></canvas>

 

    <!-- The Emoji Popup Container -->

    <div id="game-over-screen">

        <h2>Game Over!</h2>

        <div id="emoji">💀</div>

        <p id="final-score">You scored: 0</p>

        <button onclick="resetGame()">Play Again</button>

    </div>

 

    <script>

        const tg = window.Telegram.WebApp;

        tg.ready();

        tg.expand();

 

        const canvas = document.getElementById("gameCanvas");

        const ctx = canvas.getContext("2d");

        const scoreElement = document.getElementById("score");

        const gameOverScreen = document.getElementById("game-over-screen");

        const finalScoreElement = document.getElementById("final-score");

 

        const grid = 15;

        let score = 0;

        let gameInterval;

 

        let snake = { x: 150, y: 150, dx: grid, dy: 0, cells: [], maxCells: 4 };

        let apple = { x: 60, y: 60 };

 

        function getRandomInt(min, max) { return Math.floor(Math.random() * (max - min)) + min; }

 

        function resetGame() {

            snake.x = 150; snake.y = 150;

            snake.cells = []; snake.maxCells = 4;

            snake.dx = grid; snake.dy = 0;

            score = 0;

            scoreElement.innerText = "Score: " + score;

            gameOverScreen.style.display = "none";

            apple.x = getRandomInt(0, 20) * grid;

            apple.y = getRandomInt(0, 20) * grid;

           

            clearInterval(gameInterval);

            gameInterval = setInterval(loop, 1000 / 10);

        }

 

        function loop() {

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            snake.x += snake.dx;

            snake.y += snake.dy;

 

            if (snake.x < 0 || snake.x >= canvas.width || snake.y < 0 || snake.y >= canvas.height) {

                endGame(); return;

            }

 

            snake.cells.unshift({ x: snake.x, y: snake.y });

            if (snake.cells.length > snake.maxCells) { snake.cells.pop(); }

 

            ctx.fillStyle = '#ef4444';

            ctx.fillRect(apple.x, apple.y, grid - 1, grid - 1);

 

            ctx.fillStyle = '#10b981';

            snake.cells.forEach(function(cell, index) {

                ctx.fillRect(cell.x, cell.y, grid - 1, grid - 1);

 

                if (cell.x === apple.x && cell.y === apple.y) {

                    snake.maxCells++;

                    score++;

                    scoreElement.innerText = "Score: " + score;

                    apple.x = getRandomInt(0, 20) * grid;

                    apple.y = getRandomInt(0, 20) * grid;

                }

 

                for (let i = index + 1; i < snake.cells.length; i++) {

                    if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {

                        endGame(); return;

                    }

                }

            });

        }

 

        function endGame() {

            clearInterval(gameInterval);

            finalScoreElement.innerText = "You scored: " + score;

            gameOverScreen.style.display = "block";

            if (tg.HapticFeedback) { tg.HapticFeedback.notificationOccurred('error'); }

        }

 

        document.addEventListener('keydown', function(e) {

            if (e.which === 37 && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; }

            else if (e.which === 38 && snake.dy === 0) { snake.dy = -grid; snake.dx = 0; }

            else if (e.which === 39 && snake.dx === 0) { snake.dx = grid; snake.dy = 0; }

            else if (e.which === 40 && snake.dy === 0) { snake.dy = grid; snake.dx = 0; }

        });

 

        let touchstartX = 0; let touchstartY = 0;

        document.addEventListener('touchstart', e => {

            touchstartX = e.changedTouches[0].screenX;

            touchstartY = e.changedTouches[0].screenY;

        });

        document.addEventListener('touchend', e => {

            let diffX = e.changedTouches[0].screenX - touchstartX;

            let diffY = e.changedTouches[0].screenY - touchstartY;

            if (Math.abs(diffX) > Math.abs(diffY)) {

                if (diffX > 0 && snake.dx === 0) { snake.dx = grid; snake.dy = 0; }

                else if (diffX < 0 && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; }

            } else {

                if (diffY > 0 && snake.dy === 0) { snake.dy = grid; snake.dx = 0; }

                else if (diffY < 0 && snake.dy === 0) { snake.dy = -grid; snake.dx = 0; }

            }

        });

 

        resetGame();

    </script>

</body>

</html>
